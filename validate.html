// ── Header / Footer injection ──────────────
// Call on each page to inject shared components.
function injectHeader(config = {}) {
  const {
    type = 'home',        // 'home' | 'page' | 'step'
    title = '',
    subtitle = '',
    step = 1,
    totalSteps = 3,
    backHref = 'index.html',
    showNotif = false,
  } = config;

  let html = '';

  if (type === 'home') {
    html = `
      <header class="site-header">
        <div class="site-header-brand">
          <div class="site-header-logo">⚡</div>
          <div>
            <div class="site-header-name">RealityCheck</div>
            <div class="site-header-location" id="location-label" onclick="promptLocation()">
              📍 <span id="location-text">Banjara Hills, Hyderabad</span> ›
            </div>
          </div>
        </div>
        <div class="site-header-actions">
          ${showNotif ? `<button class="btn btn-icon btn-secondary" style="position:relative" onclick="window.location='validate.html'">
            🔔<span class="notif-dot" style="position:absolute;top:6px;right:6px"></span>
          </button>` : ''}
          <a href="profile.html" class="btn btn-icon btn-secondary" title="Profile">👤</a>
        </div>
      </header>`;
  }

  if (type === 'page') {
    html = `
      <header class="page-header">
        <a href="${backHref}" class="page-header-back" title="Back">←</a>
        <div class="page-header-content">
          <div class="page-header-title">${title}</div>
          ${subtitle ? `<div class="page-header-sub">${subtitle}</div>` : ''}
        </div>
      </header>`;
  }

  if (type === 'step') {
    const pct = Math.round((step / totalSteps) * 100);
    html = `
      <header class="step-header">
        <div class="step-header-top">
          <a href="${backHref}" class="page-header-back" title="Back">←</a>
          <div class="step-header-title">${title}</div>
          <span style="font-size:var(--text-xs);color:var(--color-text-tertiary)">
            ${step} / ${totalSteps}
          </span>
        </div>
        <div class="step-progress">
          <div class="step-progress-fill" style="width:${pct}%"></div>
        </div>
      </header>`;
  }

  const el = document.getElementById('header-slot');
  if (el) el.innerHTML = html;
}

function injectBottomNav(activePage = 'feed') {
  const pages = [
    { id: 'feed',     href: 'index.html',    icon: '🏠', label: 'Feed' },
    { id: 'validate', href: 'validate.html', icon: '✅', label: 'Validate' },
    { id: 'post',     href: 'post.html',     icon: '+',  label: '', isFab: true },
    { id: 'location', href: 'location.html', icon: '📍', label: 'Places' },
    { id: 'profile',  href: 'profile.html',  icon: '👤', label: 'Profile' },
  ];

  const items = pages.map(p => {
    if (p.isFab) {
      return `<a href="${p.href}" class="post-fab" title="Post reality">+</a>`;
    }
    const active = p.id === activePage ? 'active' : '';
    return `
      <a href="${p.href}" class="bottom-nav-item ${active}">
        <span class="bottom-nav-icon">${p.icon}</span>
        <span class="bottom-nav-label">${p.label}</span>
      </a>`;
  }).join('');

  const el = document.getElementById('bottom-nav-slot');
  if (el) el.innerHTML = `<nav class="bottom-nav">${items}</nav>`;
}

function injectFooter() {

  const el = document.getElementById('footer-slot');

}

// ── Confidence helpers ─────────────────────
function confClass(pct) {
  if (pct >= 75) return 'high';
  if (pct >= 50) return 'medium';
  return 'low';
}

function confLabel(pct) {
  if (pct >= 75) return 'High confidence';
  if (pct >= 50) return 'Building confidence';
  return 'Low confidence';
}

// ── State helpers ──────────────────────────
function stateBadge(state) {
  const map = {
    BUSY:     { cls: 'badge-busy',     label: 'Busy' },
    MODERATE: { cls: 'badge-moderate', label: 'Moderate' },
    EMPTY:    { cls: 'badge-empty',    label: 'Empty' },
    SLOW:     { cls: 'badge-slow',     label: 'Congested' },
    CLOSED:   { cls: 'badge-closed',   label: 'Closed' },
  };
  const s = map[state] || map.EMPTY;
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

function stateColor(state) {
  const map = {
    BUSY: 'var(--color-busy)',
    MODERATE: 'var(--color-moderate)',
    EMPTY: 'var(--color-empty)',
    SLOW: 'var(--color-slow)',
    CLOSED: 'var(--color-closed)',
  };
  return map[state] || map.EMPTY;
}

// ── Freshness label ────────────────────────
function freshnessLabel(minutesAgo) {
  if (minutesAgo < 1)  return 'just now';
  if (minutesAgo < 60) return `${minutesAgo}m ago`;
  const h = Math.floor(minutesAgo / 60);
  return `${h}h ago`;
}

function freshnessClass(minutesAgo) {
  if (minutesAgo <= 5)  return 'high';
  if (minutesAgo <= 20) return 'medium';
  return 'low';
}

// ── Toast ──────────────────────────────────
function showToast(message, duration = 2500) {
  let toast = document.querySelector('.toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ── Location prompt ────────────────────────
function promptLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => showToast('📍 Location updated'),
      ()  => showToast('📍 Using saved location')
    );
  }
}

// ── Render feed card HTML ──────────────────
function renderFeedCard(post, index = 0) {
  const conf = post.confidence;
  const cls  = confClass(conf);
  const mins = post.minutesAgo;
  const freshCls = freshnessClass(mins);

  return `
    <article class="feed-card animate-fade-in stagger-${Math.min(index+1,5)}"
             onclick="window.location='location.html?id=${post.id}'">
      <div class="feed-card-image">
        <div class="feed-card-image-placeholder">
          <span style="font-size:28px">${post.categoryIcon}</span>
          <span>${post.locationName}</span>
        </div>
        <div class="feed-card-state-overlay">
          ${stateBadge(post.state)}
        </div>
      </div>
      <div class="feed-card-body">
        <div class="feed-card-meta">
          <div class="feed-card-location">${post.locationName}</div>
          <div class="feed-card-time"
               style="color:var(--color-conf-${freshCls})">
            ${freshnessLabel(mins)}
          </div>
        </div>
        <div class="feed-card-confidence">
          ${stateBadge(post.state)}
          <div class="conf-bar-wrap">
            <div class="conf-bar-fill ${cls}" style="width:${conf}%"></div>
          </div>
          <div class="feed-card-conf-label">${conf}%</div>
        </div>
        <div class="feed-card-actions">
          <button class="btn btn-confirm btn-sm"
                  style="flex:1"
                  onclick="event.stopPropagation();handleConfirm(${post.id})">
            ✓ Confirm · earn ₹0.33
          </button>
          <button class="btn btn-danger btn-sm"
                  style="flex:1"
                  onclick="event.stopPropagation();handleDispute(${post.id})">
            ✗ Dispute
          </button>
        </div>
        <div class="feed-card-footnote">
          ${post.validatorCount} of 3 confirmed · ${post.blockchainHash}
        </div>
      </div>
    </article>`;
}

// ── Render gap card HTML ───────────────────
function renderGapCard(location) {
  return `
    <div class="gap-card animate-fade-in section-sm">

          Last report was ${location.staleMin} min ago.

        <a href="post.html?location=${encodeURIComponent(location.name)}"
           class="btn btn-sm"
           style="background:var(--color-brand-accent);color:#fff;border:none">
          Post update · earn ₹${location.reward}
        </a>
      </div>
    </div>`;
}

// ── Validation helpers ─────────────────────
function handleConfirm(postId) {
  showToast('✓ Confirmation submitted — earning ₹0.33');
}

function handleDispute(postId) {
  showToast('✗ Dispute submitted');
}

</script>

<script>
  const TASKS = [
    {
      id: 201, locationName: 'GVK One Mall',
      category: 'Crowd', categoryIcon: '☕',
      state: 'BUSY', minutesAgo: 3,
      confirmCount: 2, totalNeeded: 3,
      timeLeft: '7 min',
      desc: 'Very crowded near food court. Long wait for tables.',
      isDeciding: true, // this user is the deciding vote
    },
    {
      id: 202, locationName: 'PVNR Expressway — Junction',
      category: 'Traffic', categoryIcon: '🚗',

      confirmCount: 1, totalNeeded: 3,
      timeLeft: '4 min',
      desc: 'Backed up from Panjagutta signal. Slow moving.',
      isDeciding: false,

    {
      id: 203, locationName: 'Apollo Hospital — OPD',
      category: 'Queue', categoryIcon: '🏥',
      state: 'BUSY', minutesAgo: 4,
      confirmCount: 0, totalNeeded: 3,
      timeLeft: '9 min',
      desc: 'Very long queue at registration counter.',
      isDeciding: false,
    },
    {
      id: 204, locationName: 'Inorbit Mall Parking',
      category: 'Parking', categoryIcon: '🅿',
      state: 'BUSY', minutesAgo: 8,
      confirmCount: 1, totalNeeded: 3,
      timeLeft: '6 min',
      desc: 'B3 and B4 levels completely full.',
      isDeciding: false,
    },
  ];

  const CLOSED = [
    { locationName: 'Third Wave Coffee', state: 'EMPTY',    result: 'VALID',   yourVote: 'confirm', earned: '₹0.33' },
    { locationName: 'Jubilee Hills Rd',  state: 'MODERATE', result: 'VALID',   yourVote: 'confirm', earned: '₹0.33' },
    { locationName: 'HICC Complex',      state: 'BUSY',     result: 'INVALID', yourVote: 'dispute', earned: '₹0.33' },
  ];

  const voted = new Set(); // track which tasks this session has been voted on

  document.addEventListener('DOMContentLoaded', () => {
    injectHeader({
      type: 'page',
      title: 'Validate',
      subtitle: 'Earn ₹0.33 per correct vote',
      backHref: 'index.html',
    });
    injectBottomNav('validate');
    injectFooter();
    renderTasks();
    renderClosed();
  });

  function renderTasks() {
    const list = document.getElementById('tasks-list');
    const activeTasks = TASKS.filter(t => !voted.has(t.id));
    document.getElementById('task-count').textContent = activeTasks.length;

    if (!activeTasks.length) {
      list.innerHTML = `
        <div style="text-align:center;padding:var(--space-8) 0">
          <div style="font-size:36px;margin-bottom:var(--space-3)">🎉</div>
          <div style="font-size:var(--text-base);font-weight:var(--weight-medium);
                      color:var(--color-text-primary);margin-bottom:var(--space-2)">
            All caught up!
          </div>
          <div style="font-size:var(--text-sm);color:var(--color-text-tertiary)">
            No more tasks right now. Check back in a few minutes.
          </div>
        </div>`;
      return;
    }

    list.innerHTML = activeTasks.map(t => `
      <div class="card animate-fade-in ${t.isDeciding ? '' : ''}"
           style="${t.isDeciding ? 'border:1.5px solid var(--color-brand-primary)' : ''}">

        ${t.isDeciding ? `
          <div style="background:var(--color-brand-primary);color:white;
                      padding:var(--space-2) var(--space-4);
                      font-size:var(--text-xs);font-weight:var(--weight-semibold);
                      letter-spacing:0.05em">
            ⭐ YOU'RE THE DECIDING VOTE — EARN ₹0.33
          </div>` : ''}

        <!-- Photo area -->
        <div class="feed-card-image" style="aspect-ratio:16/6;cursor:pointer"
             onclick="expandPhoto(${t.id})">
          <div class="feed-card-image-placeholder">
            <span style="font-size:32px">${t.categoryIcon}</span>
            <span style="font-size:var(--text-sm)">${t.locationName}</span>
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary)">Tap to expand</span>
          </div>
          <div class="feed-card-state-overlay">${stateBadge(t.state)}</div>
        </div>

        <div class="card-body">
          <!-- Meta -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;
                      margin-bottom:var(--space-2)">
            <div>
              <div style="font-size:var(--text-base);font-weight:var(--weight-semibold);
                          color:var(--color-text-primary)">${t.locationName}</div>
              <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);margin-top:2px">
                ${t.category} · ${freshnessLabel(t.minutesAgo)}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:var(--text-xs);color:var(--color-busy);
                          font-weight:var(--weight-semibold)">⏱ ${t.timeLeft} left</div>
              <div style="font-size:var(--text-xs);color:var(--color-text-tertiary)">
                ${t.confirmCount}/${t.totalNeeded} confirmed
              </div>
            </div>
          </div>

          <!-- Description -->
          <p style="font-size:var(--text-sm);color:var(--color-text-secondary);
                    margin-bottom:var(--space-3);line-height:var(--leading-relaxed)">${t.desc}</p>

          <!-- Validator progress -->
          <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3)">
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary)">Validators</span>
            <div class="conf-bar-wrap">
              <div class="conf-bar-fill ${t.confirmCount >= 2 ? 'high' : 'medium'}"
                   style="width:${(t.confirmCount/t.totalNeeded)*100}%"></div>
            </div>
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary);min-width:28px">
              ${t.confirmCount}/${t.totalNeeded}
            </span>
          </div>

          <!-- Vote buttons -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)"
               id="vote-btns-${t.id}">
            <button class="btn btn-confirm" onclick="vote(${t.id},'confirm')">
              ✓ Looks correct
            </button>
            <button class="btn btn-danger" onclick="vote(${t.id},'dispute')">
              ✗ Not correct
            </button>
          </div>

          <p style="font-size:var(--text-xs);color:var(--color-text-tertiary);
                    text-align:center;margin-top:var(--space-2)">
            Votes hidden until window closes · Prevents herd bias
          </p>
        </div>
      </div>`).join('');
  }

  function renderClosed() {
    const list = document.getElementById('closed-list');
    list.innerHTML = CLOSED.map(c => `
      <div class="card card-body animate-fade-in" style="opacity:0.8">
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          ${stateBadge(c.state)}
          <div style="flex:1;font-size:var(--text-sm);color:var(--color-text-primary)">

          <span class="badge ${c.result === 'VALID' ? 'badge-verified' : 'badge-busy'}">
            ${c.result}
          </span>
          <span class="badge badge-earn">${c.earned}</span>
        </div>
      </div>`).join('');
  }

  function vote(taskId, type) {
    voted.add(taskId);
    const btns = document.getElementById(`vote-btns-${taskId}`);
    if (btns) {
      btns.innerHTML = `
        <div style="text-align:center;padding:var(--space-2) 0;
                    font-size:var(--text-sm);color:var(--color-brand-primary);
                    font-weight:var(--weight-medium);grid-column:1/-1">
          ${type === 'confirm' ? '✓ Confirmation submitted' : '✗ Dispute submitted'} — earning ₹0.33 if correct

    }
    showToast(type === 'confirm'
      ? '✓ Confirmation recorded — earn ₹0.33 if correct'
      : '✗ Dispute recorded — earn ₹0.33 if correct');

    // Re-render after delay
    setTimeout(() => renderTasks(), 1200);
  }

  function expandPhoto(taskId) {
