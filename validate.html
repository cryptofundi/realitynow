<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validate — RealityCheck</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <script src="js/app.js"></script>
</head>
<body>

<div class="page-shell">
  <div id="header-slot"></div>

  <main class="page-content">
    <div class="page-content-inner">

      <!-- Earnings summary -->
      <div class="card card-body section-sm animate-fade-in"
           style="background:linear-gradient(135deg,var(--color-brand-light),#fff);border-color:#a8e6d5">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-brand-primary);
                        font-weight:var(--weight-semibold);letter-spacing:0.06em;text-transform:uppercase;
                        margin-bottom:var(--space-1)">Your validation earnings</div>
            <div style="font-size:var(--text-3xl);font-weight:var(--weight-semibold);
                        color:var(--color-brand-primary)">₹12.81</div>
            <div style="font-size:var(--text-xs);color:var(--color-text-tertiary)">39 correct validations · 94% accuracy</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);margin-bottom:var(--space-1)">
              Tasks available
            </div>
            <div style="font-size:var(--text-2xl);font-weight:var(--weight-semibold);
                        color:var(--color-text-primary)" id="task-count">5</div>
          </div>
        </div>
      </div>

      <!-- How validation works -->
      <div class="card card-body-sm section-sm animate-fade-in stagger-1"
           style="background:var(--color-surface-subtle);border:none">
        <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);
                    font-weight:var(--weight-semibold);letter-spacing:0.06em;
                    text-transform:uppercase;margin-bottom:var(--space-2)">How it works</div>
        <div style="display:flex;gap:var(--space-4)">
          <div style="text-align:center;flex:1">
            <div style="font-size:20px;margin-bottom:var(--space-1)">👀</div>
            <div style="font-size:var(--text-xs);color:var(--color-text-secondary)">See the photo</div>
          </div>
          <div style="color:var(--color-text-tertiary);align-self:center">→</div>
          <div style="text-align:center;flex:1">
            <div style="font-size:20px;margin-bottom:var(--space-1)">✓ or ✗</div>
            <div style="font-size:var(--text-xs);color:var(--color-text-secondary)">Confirm or dispute</div>
          </div>
          <div style="color:var(--color-text-tertiary);align-self:center">→</div>
          <div style="text-align:center;flex:1">
            <div style="font-size:20px;margin-bottom:var(--space-1)">₹0.33</div>
            <div style="font-size:var(--text-xs);color:var(--color-text-secondary)">Earn if correct</div>
          </div>
        </div>
        <div style="margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-tertiary);
                    padding:var(--space-2) var(--space-3);background:white;border-radius:var(--radius-sm)">
          🔒 Votes are hidden until the window closes — prevents herd bias
        </div>
      </div>

      <!-- Active validation tasks -->
      <div class="section-label animate-fade-in stagger-2">Posts needing validation near you</div>
      <div class="stack stack-3" id="tasks-list"></div>

      <!-- Completed / locked tasks -->
      <div class="divider"></div>
      <div class="section-label animate-fade-in">Recently closed</div>
      <div class="stack stack-3" id="closed-list"></div>

    </div>
  </main>

  <div id="bottom-nav-slot"></div>
  <div id="footer-slot"></div>
</div>

<script>
  const TASKS = [
    {
      id: 201, locationName: 'GVK One Mall',
      category: 'Crowd', categoryIcon: '☕',
      state: 'BUSY', minutesAgo: 3,
      confirmCount: 2, totalNeeded: 3,
      timeLeft: '7 min',
      desc: 'Very crowded near food court. Long wait for tables.',
      isDeciding: true, // this user is the deciding vote
    },
    {
      id: 202, locationName: 'PVNR Expressway — Junction',
      category: 'Traffic', categoryIcon: '🚗',
      state: 'SLOW', minutesAgo: 6,
      confirmCount: 1, totalNeeded: 3,
      timeLeft: '4 min',
      desc: 'Backed up from Panjagutta signal. Slow moving.',
      isDeciding: false,
    },
    {
      id: 203, locationName: 'Apollo Hospital — OPD',
      category: 'Queue', categoryIcon: '🏥',
      state: 'BUSY', minutesAgo: 4,
      confirmCount: 0, totalNeeded: 3,
      timeLeft: '9 min',
      desc: 'Very long queue at registration counter.',
      isDeciding: false,
    },
    {
      id: 204, locationName: 'Inorbit Mall Parking',
      category: 'Parking', categoryIcon: '🅿',
      state: 'BUSY', minutesAgo: 8,
      confirmCount: 1, totalNeeded: 3,
      timeLeft: '6 min',
      desc: 'B3 and B4 levels completely full.',
      isDeciding: false,
    },
  ];

  const CLOSED = [
    { locationName: 'Third Wave Coffee', state: 'EMPTY',    result: 'VALID',   yourVote: 'confirm', earned: '₹0.33' },
    { locationName: 'Jubilee Hills Rd',  state: 'MODERATE', result: 'VALID',   yourVote: 'confirm', earned: '₹0.33' },
    { locationName: 'HICC Complex',      state: 'BUSY',     result: 'INVALID', yourVote: 'dispute', earned: '₹0.33' },
  ];

  const voted = new Set(); // track which tasks this session has been voted on

  document.addEventListener('DOMContentLoaded', () => {
    injectHeader({
      type: 'page',
      title: 'Validate',
      subtitle: 'Earn ₹0.33 per correct vote',
      backHref: 'index.html',
    });
    injectBottomNav('validate');
    injectFooter();
    renderTasks();
    renderClosed();
  });

  function renderTasks() {
    const list = document.getElementById('tasks-list');
    const activeTasks = TASKS.filter(t => !voted.has(t.id));
    document.getElementById('task-count').textContent = activeTasks.length;

    if (!activeTasks.length) {
      list.innerHTML = `
        <div style="text-align:center;padding:var(--space-8) 0">
          <div style="font-size:36px;margin-bottom:var(--space-3)">🎉</div>
          <div style="font-size:var(--text-base);font-weight:var(--weight-medium);
                      color:var(--color-text-primary);margin-bottom:var(--space-2)">
            All caught up!
          </div>
          <div style="font-size:var(--text-sm);color:var(--color-text-tertiary)">
            No more tasks right now. Check back in a few minutes.
          </div>
        </div>`;
      return;
    }

    list.innerHTML = activeTasks.map(t => `
      <div class="card animate-fade-in ${t.isDeciding ? '' : ''}"
           style="${t.isDeciding ? 'border:1.5px solid var(--color-brand-primary)' : ''}">

        ${t.isDeciding ? `
          <div style="background:var(--color-brand-primary);color:white;
                      padding:var(--space-2) var(--space-4);
                      font-size:var(--text-xs);font-weight:var(--weight-semibold);
                      letter-spacing:0.05em">
            ⭐ YOU'RE THE DECIDING VOTE — EARN ₹0.33
          </div>` : ''}

        <!-- Photo area -->
        <div class="feed-card-image" style="aspect-ratio:16/6;cursor:pointer"
             onclick="expandPhoto(${t.id})">
          <div class="feed-card-image-placeholder">
            <span style="font-size:32px">${t.categoryIcon}</span>
            <span style="font-size:var(--text-sm)">${t.locationName}</span>
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary)">Tap to expand</span>
          </div>
          <div class="feed-card-state-overlay">${stateBadge(t.state)}</div>
        </div>

        <div class="card-body">
          <!-- Meta -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;
                      margin-bottom:var(--space-2)">
            <div>
              <div style="font-size:var(--text-base);font-weight:var(--weight-semibold);
                          color:var(--color-text-primary)">${t.locationName}</div>
              <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);margin-top:2px">
                ${t.category} · ${freshnessLabel(t.minutesAgo)}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:var(--text-xs);color:var(--color-busy);
                          font-weight:var(--weight-semibold)">⏱ ${t.timeLeft} left</div>
              <div style="font-size:var(--text-xs);color:var(--color-text-tertiary)">
                ${t.confirmCount}/${t.totalNeeded} confirmed
              </div>
            </div>
          </div>

          <!-- Description -->
          <p style="font-size:var(--text-sm);color:var(--color-text-secondary);
                    margin-bottom:var(--space-3);line-height:var(--leading-relaxed)">${t.desc}</p>

          <!-- Validator progress -->
          <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3)">
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary)">Validators</span>
            <div class="conf-bar-wrap">
              <div class="conf-bar-fill ${t.confirmCount >= 2 ? 'high' : 'medium'}"
                   style="width:${(t.confirmCount/t.totalNeeded)*100}%"></div>
            </div>
            <span style="font-size:var(--text-xs);color:var(--color-text-tertiary);min-width:28px">
              ${t.confirmCount}/${t.totalNeeded}
            </span>
          </div>

          <!-- Vote buttons -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)"
               id="vote-btns-${t.id}">
            <button class="btn btn-confirm" onclick="vote(${t.id},'confirm')">
              ✓ Looks correct
            </button>
            <button class="btn btn-danger" onclick="vote(${t.id},'dispute')">
              ✗ Not correct
            </button>
          </div>

          <p style="font-size:var(--text-xs);color:var(--color-text-tertiary);
                    text-align:center;margin-top:var(--space-2)">
            Votes hidden until window closes · Prevents herd bias
          </p>
        </div>
      </div>`).join('');
  }

  function renderClosed() {
    const list = document.getElementById('closed-list');
    list.innerHTML = CLOSED.map(c => `
      <div class="card card-body animate-fade-in" style="opacity:0.8">
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          ${stateBadge(c.state)}
          <div style="flex:1;font-size:var(--text-sm);color:var(--color-text-primary)">
            ${c.locationName}
          </div>
          <span class="badge ${c.result === 'VALID' ? 'badge-verified' : 'badge-busy'}">
            ${c.result}
          </span>
          <span class="badge badge-earn">${c.earned}</span>
        </div>
      </div>`).join('');
  }

  function vote(taskId, type) {
    voted.add(taskId);
    const btns = document.getElementById(`vote-btns-${taskId}`);
    if (btns) {
      btns.innerHTML = `
        <div style="text-align:center;padding:var(--space-2) 0;
                    font-size:var(--text-sm);color:var(--color-brand-primary);
                    font-weight:var(--weight-medium);grid-column:1/-1">
          ${type === 'confirm' ? '✓ Confirmation submitted' : '✗ Dispute submitted'} — earning ₹0.33 if correct
        </div>`;
    }
    showToast(type === 'confirm'
      ? '✓ Confirmation recorded — earn ₹0.33 if correct'
      : '✗ Dispute recorded — earn ₹0.33 if correct');

    // Re-render after delay
    setTimeout(() => renderTasks(), 1200);
  }

  function expandPhoto(taskId) {
    showToast('📸 Full photo view coming soon');
  }
</script>
</body>
</html>
